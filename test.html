<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #121214; 
            background-image: radial-gradient(circle at 50% 30%, #2a2a35 0%, #0a0a0c 80%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 200vh; overflow-x: hidden;
            -webkit-user-select: none; user-select: none;
        }

        .content-container { padding: 100px 20px; max-width: 800px; margin: 0 auto; }
        
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 20px; padding: 30px; margin-bottom: 20px;
        }

        .glass-nav-wrapper {
            position: fixed; left: 50%; transform: translateX(-50%);
            height: 48px; 
            border-radius: 50px;
            background: rgba(20, 20, 22, 0.4); 
            backdrop-filter: blur(25px) saturate(150%); -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.6), 
                0 10px 15px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            z-index: 9999; overflow: hidden; 
            touch-action: pan-y; cursor: grab;
            width: 140px; 
            transition: 
                width 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                opacity 0.5s ease;
        }
        .glass-nav-wrapper:active { cursor: grabbing; }

        .glass-nav-wrapper.is-open,
        .glass-nav-wrapper:hover {
            width: 360px;
        }

        .center-lens-visual {
            position: absolute; top: 6px; bottom: 6px; left: 50%; transform: translateX(-50%);
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.5);
            pointer-events: none; z-index: 2;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .nav-track {
            position: absolute; top: 0; left: 50%; height: 100%;
            display: flex; align-items: center;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .nav-item {
            display: flex; justify-content: center; align-items: center;
            padding: 0 18px; 
            white-space: nowrap;
            font-size: 13px; font-weight: 600; letter-spacing: 1px;
            will-change: filter, opacity;
        }

        #trackGrey { z-index: 1; }
        #trackGrey .nav-item { color: rgba(255, 255, 255, 0.4); }

        .yellow-clipper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 3;
            transition: clip-path 0.4s cubic-bezier(0.25, 1, 0.5, 1), -webkit-clip-path 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #trackYellow { z-index: 3; }
        #trackYellow .nav-item {
            color: #f7d66f;
            text-shadow: 0 0 10px rgba(247, 214, 111, 0.3); 
        }

        .glass-nav-wrapper { bottom: 40px; top: auto; }
        .glass-nav-wrapper.hidden-mobile { transform: translate(-50%, 150%); opacity: 0; }
        @media (min-width: 768px) {
            .glass-nav-wrapper { top: 40px; bottom: auto; }
            .glass-nav-wrapper.is-open, .glass-nav-wrapper:hover { width: 440px; }
            .glass-nav-wrapper.hidden-desktop { transform: translate(-50%, -150%); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="glass-nav-wrapper" id="navWrapper">
        <div class="nav-track" id="trackGrey"></div>
        <div class="center-lens-visual" id="lensVisual"></div>
        <div class="yellow-clipper" id="yellowClipper">
            <div class="nav-track" id="trackYellow"></div>
        </div>
    </div>

    <script>
        const modes =['Test', 'Test', 'Test'];
        
        const wrapper = document.getElementById('navWrapper');
        const trackGrey = document.getElementById('trackGrey');
        const trackYellow = document.getElementById('trackYellow');
        const lensVisual = document.getElementById('lensVisual');
        const clipper = document.getElementById('yellowClipper');

        modes.forEach((mode, index) => {
            const greyItem = document.createElement('div');
            greyItem.className = 'nav-item';
            greyItem.dataset.index = index;
            greyItem.textContent = mode;
            trackGrey.appendChild(greyItem);

            const yellowItem = document.createElement('div');
            yellowItem.className = 'nav-item';
            yellowItem.textContent = mode;
            trackYellow.appendChild(yellowItem);
        });

        const itemsGrey = document.querySelectorAll('#trackGrey .nav-item');
        
        let currentTranslateX = 0;
        let isDragging = false;
        let isTransitioning = false;
        let startX = 0;
        let initialTranslateX = 0;
        let activeIndex = 1; 

        function updateEdgeBlur() {
            let realX = currentTranslateX;
            
            if (isTransitioning || isDragging) {
                const style = window.getComputedStyle(trackGrey);
                const matrix = new DOMMatrixReadOnly(style.transform);
                realX = matrix.m41;
            }

            const wrapperHalfWidth = wrapper.offsetWidth / 2;
            const edgeThreshold = 65; 

            itemsGrey.forEach((item) => {
                const itemRelativeCenter = item.offsetLeft + item.offsetWidth / 2;
                const itemCurrentX = itemRelativeCenter + realX;
                const distToEdge = wrapperHalfWidth - Math.abs(itemCurrentX);
                
                let blur = 0;
                let opacity = 1;
                
                if (distToEdge < edgeThreshold) {
                    const blurFactor = 1 - (Math.max(0, distToEdge) / edgeThreshold);
                    blur = blurFactor * 8;
                    opacity = 1 - (blurFactor * 0.9);
                }
                
                item.style.filter = `blur(${blur}px)`;
                item.style.opacity = opacity;
            });

            if (isTransitioning || isDragging) {
                requestAnimationFrame(updateEdgeBlur);
            }
        }

        function snapToIndex(index) {
            if (index < 0) index = 0;
            if (index >= itemsGrey.length) index = itemsGrey.length - 1;

            const targetItem = itemsGrey[index];
            const itemCenter = targetItem.offsetLeft + (targetItem.offsetWidth / 2);
            currentTranslateX = -itemCenter;

            trackGrey.style.transition = trackYellow.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            trackGrey.style.transform = `translateX(${currentTranslateX}px)`;
            trackYellow.style.transform = `translateX(${currentTranslateX}px)`;

            const w = targetItem.offsetWidth;
            lensVisual.style.width = `${w}px`;

            const clipString = `inset(6px calc(50% - ${w/2}px) 6px calc(50% - ${w/2}px) round 40px)`;
            clipper.style.clipPath = clipString;
            clipper.style.webkitClipPath = clipString;

            activeIndex = index;

            isTransitioning = true;
            updateEdgeBlur();
            setTimeout(() => { 
                isTransitioning = false; 
                updateEdgeBlur(); 
            }, 450);
        }

        window.addEventListener('load', () => snapToIndex(activeIndex));
        window.addEventListener('resize', () => {
            snapToIndex(activeIndex);
            updateEdgeBlur(); 
        });

        function dragStart(e) {
            isDragging = true;
            wrapper.classList.add('is-open');
            trackGrey.style.transition = trackYellow.style.transition = 'none';
            startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            initialTranslateX = currentTranslateX;
            updateEdgeBlur();
        }

        function dragMove(e) {
            if (!isDragging) return;
            e.preventDefault(); 
            const currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            const diffX = currentX - startX;
            currentTranslateX = initialTranslateX + diffX;
            
            trackGrey.style.transform = `translateX(${currentTranslateX}px)`;
            trackYellow.style.transform = `translateX(${currentTranslateX}px)`;
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            wrapper.classList.remove('is-open');

            let closestIndex = 0;
            let minDistance = Infinity;

            itemsGrey.forEach((item, index) => {
                const itemRelativeCenter = item.offsetLeft + item.offsetWidth / 2;
                const dist = Math.abs(itemRelativeCenter + currentTranslateX);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestIndex = index;
                }
            });

            snapToIndex(closestIndex);
        }

        wrapper.addEventListener('touchstart', dragStart, { passive: false });
        window.addEventListener('touchmove', dragMove, { passive: false });
        window.addEventListener('touchend', dragEnd);
        wrapper.addEventListener('mousedown', dragStart);
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('mouseup', dragEnd);
        
        wrapper.addEventListener('mouseleave', () => {
            if(isDragging) dragEnd();
            isTransitioning = true;
            updateEdgeBlur();
            setTimeout(() => { isTransitioning = false; updateEdgeBlur(); }, 400);
        });
        
        wrapper.addEventListener('mouseenter', () => {
            isTransitioning = true;
            updateEdgeBlur();
            setTimeout(() => { isTransitioning = false; updateEdgeBlur(); }, 400);
        });

        itemsGrey.forEach((item, index) => {
            item.addEventListener('click', () => {
                if (!isDragging) snapToIndex(index);
            });
        });

        let lastScrollY = window.scrollY;
        
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            const isDesktop = window.innerWidth >= 768;

            if (scrollY > 60) {
                if (scrollY > lastScrollY) {
                    isDesktop ? wrapper.classList.add('hidden-desktop') : wrapper.classList.add('hidden-mobile');
                } else {
                    wrapper.classList.remove('hidden-desktop');
                    wrapper.classList.remove('hidden-mobile');
                }
            } else {
                wrapper.classList.remove('hidden-desktop');
                wrapper.classList.remove('hidden-mobile');
            }
            lastScrollY = scrollY;
        });
    </script>
</body>
</html>
